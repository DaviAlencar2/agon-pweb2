<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 w-full max-w-sm flex flex-col gap-6">

    <div>
        <h1 class="text-2xl font-bold text-red-700 mb-1">Entrar no Agon</h1>
        <p class="text-gray-500 text-sm">Digite seu nome para participar.</p>
    </div>

    <p th:if="${error}"
       th:text="${error}"
       class="text-red-600 text-sm bg-red-50 border border-red-200 rounded-lg px-4 py-2">
    </p>

    <form th:object="${playerDto}" th:action="@{/login}" method="post" class="flex flex-col gap-4">

        <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">Seu nome</label>
            <input type="text"
                   th:field="*{name}"
                   placeholder="Ex: João"
                   class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400"/>
            <span th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}"
                  class="text-red-500 text-xs mt-1">
            </span>
        </div>

        <button type="submit"
                class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-6 py-2 rounded-lg transition">
            Entrar
        </button>

    </form>

</div>

</body>
</html>
