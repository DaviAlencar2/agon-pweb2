<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="bg-gray-100 min-h-screen">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="max-w-xl mx-auto mt-12 px-4">
    <h1 class="text-2xl font-bold text-red-700 mb-1">Nova Questão</h1>
    <p class="text-gray-500 text-sm mb-8"
       th:text="'Corrida: ' + ${race.title}"></p>

    <form th:object="${question}"
          th:action="@{/race/{id}/questions/create(id=${race.id})}"
          method="post"
          class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 flex flex-col gap-6">

        <!-- Enunciado -->
        <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">Enunciado</label>
            <textarea th:field="*{statement}" rows="3"
                      class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 resize-none">
            </textarea>
            <span th:if="${#fields.hasErrors('statement')}"
                  th:errors="*{statement}"
                  class="text-red-500 text-xs"></span>
        </div>

        <!-- Opção 1 -->
        <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">Opção 1</label>
            <input type="text"
                   th:field="*{option1}"
                   class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400"/>
            <span th:if="${#fields.hasErrors('option1')}"
                  th:errors="*{option1}"
                  class="text-red-500 text-xs"></span>
        </div>

        <!-- Opção 2 -->
        <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">Opção 2</label>
            <input type="text"
                   th:field="*{option2}"
                   class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400"/>
            <span th:if="${#fields.hasErrors('option2')}"
                  th:errors="*{option2}"
                  class="text-red-500 text-xs"></span>
        </div>

        <!-- Opção 3 -->
        <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">Opção 3</label>
            <input type="text"
                   th:field="*{option3}"
                   class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400"/>
            <span th:if="${#fields.hasErrors('option3')}"
                  th:errors="*{option3}"
                  class="text-red-500 text-xs"></span>
        </div>

        <!-- Opção 4 -->
        <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">Opção 4</label>
            <input type="text"
                   th:field="*{option4}"
                   class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400"/>
            <span th:if="${#fields.hasErrors('option4')}"
                  th:errors="*{option4}"
                  class="text-red-500 text-xs"></span>
        </div>

        <!-- Resposta correta -->
        <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700">Resposta correta</label>
            <select th:field="*{answer}"
                    class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400">
                <option value="0">Opção 1</option>
                <option value="1">Opção 2</option>
                <option value="2">Opção 3</option>
                <option value="3">Opção 4</option>
            </select>
            <span th:if="${#fields.hasErrors('answer')}"
                  th:errors="*{answer}"
                  class="text-red-500 text-xs"></span>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-6 py-2 rounded-lg transition">
                Salvar questão
            </button>
            <a th:href="@{/}"
               class="text-sm text-gray-500 px-4 py-2 rounded-lg border border-gray-200 hover:border-gray-300 transition">
                Cancelar
            </a>
        </div>
    </form>
</main>
</body>
</html>
