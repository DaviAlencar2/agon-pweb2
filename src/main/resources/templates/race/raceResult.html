<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body class="bg-gray-100 min-h-screen">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="max-w-xl mx-auto mt-12 px-4">
    <div class="bg-white border border-gray-200 rounded-xl p-8 flex flex-col gap-6 text-center">

        <h1 class="text-2xl font-bold text-red-700">Corrida finalizada!</h1>

        <p class="text-gray-600 text-sm"
           th:text="'Jogador: ' + ${result.player.name}"></p>

        <p class="text-gray-600 text-sm"
           th:text="'Corrida: ' + ${result.race.title}"></p>

        <p class="text-4xl font-bold text-gray-800"
           th:text="${result.correctAnswers} + ' acertos'"></p>

        <a th:href="@{/}"
           class="text-sm text-red-700 font-medium px-4 py-2 border border-red-200 rounded-lg hover:bg-red-50 transition inline-block">
            Voltar ao início
        </a>

    </div>
</main>
</body>
</html>
